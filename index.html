<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mini Minecraft</title>
<style>
body{margin:0;text-align:center;font-family:sans-serif;background:#87ceeb;}
canvas{border:2px solid #000;}
</style>
</head>
<body>
<h3>Mini Minecraft</h3>
<p>Clic izquierdo: poner bloque | Clic derecho: sacar bloque</p>
<canvas id="game" width="640" height="480"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const t=32, cols=20, rows=15;
let w=[];

for(let y=0;y<rows;y++){
  w[y]=[];
  for(let x=0;x<cols;x++) w[y][x]=(y>9)?1:0;
}

function draw(){
 ctx.fillStyle='#87ceeb';
 ctx.fillRect(0,0,640,480);
 for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
   if(w[y][x]){
    ctx.fillStyle='#8B5A2B';
    ctx.fillRect(x*t,y*t,t,t);
    ctx.fillStyle='#3CB043';
    ctx.fillRect(x*t,y*t,t,6);
   }
   ctx.strokeStyle='rgba(0,0,0,0.1)';
   ctx.strokeRect(x*t,y*t,t,t);
  }
 }
}
canvas.onclick=(e)=>{
 let r=canvas.getBoundingClientRect();
 let x=Math.floor((e.clientX-r.left)/t);
 let y=Math.floor((e.clientY-r.top)/t);
 w[y][x]=1; draw();
};
canvas.oncontextmenu=(e)=>{
 e.preventDefault();
 let r=canvas.getBoundingClientRect();
 let x=Math.floor((e.clientX-r.left)/t);
 let y=Math.floor((e.clientY-r.top)/t);
 w[y][x]=0; draw();
};
draw();
</script>
</body>
</html>
